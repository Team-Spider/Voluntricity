<!DOCTYPE html>
<html lang="en">
 {%load static%}
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voluntricity</title>
    <meta content="" name="description" />
    <meta content="" name="keywords" />

    <!-- Favicons -->
    <link href='{%static "assets/img/logo.png" %}' rel="icon" />
    <link
      href='{%static "assets/img/apple-touch-icon.png"%}'
      rel="apple-touch-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
  </head>
  <body>

      <section class="vh-100" style="background-color: #eee">
      <div class="container h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
          <div class="col-lg-12 col-xl-11">
            <div class="card text-black" style="border-radius: 25px">
              <div class="card-body p-md-5">
                <div class="row justify-content-center">
                  <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
                    <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">
                      Sign up
                    </p>

                    <form id="signup-form" action="/organizations/signup/" method="post">
                      {% csrf_token %}

                      <div style="color: red"><p>{{umessage}}</p></div>

                      <div class="mb-3">
                        <i class="fas fa-user fa-lg me-2"></i>
                        <input
                          type="text"
                          class="form-control rounded-pill"
                          id="fname"
                          name="fname"
                          placeholder="Your Organization Name"
                          required
                        />
                      </div>

                      <div class="mb-3">
                        <i class="fas fa-envelope fa-lg me-2"></i>
                        <input
                          type="email"
                          class="form-control rounded-pill"
                          id="email"
                          name="email"
                          placeholder="Your Email"
                          required
                        />
                      </div>

                      <div class="mb-3">
                        <i class="fas fa-lock fa-lg me-2"></i>
                        <input
                          type="password"
                          class="form-control rounded-pill"
                          id="pass1"
                          name="pass1"
                          placeholder="Password"
                          required
                        />
                      </div>

                      <div class="mb-3">
                        <i class="fas fa-key fa-lg me-2"></i>
                        <input
                          type="password"
                          class="form-control rounded-pill"
                          id="pass2"
                          name="pass2"
                          placeholder="Repeat Password"
                          required
                        />
                      </div>

                      <div style="color: red"><p>{{pmessage}}</p></div>

                     <!--<div class="form-check mb-4">
                        <input
                          class="form-check-input me-2"
                          type="checkbox"
                          value=""
                          id="form2Example3c"
                        />
                        <label
                          class="form-check-label required"
                          for="form2Example3"
                        >
                          I agree to the <a href="#!">Terms of service</a>
                        </label>
                      </div> -->

                      <div class="text-center">
                        <button
                          type="submit"
                          class="btn btn-primary btn-lg rounded-pill"
                        >
                          Register
                        </button>
                      </div>
                    </form>
                  </div>
                  <div
                    class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2"
                  >
                    <img
                      src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                      class="img-fluid"
                      alt="Sample image"
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
