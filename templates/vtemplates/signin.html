<!DOCTYPE html>
<html lang="en">
  {%load static%}
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voluntricity</title>
    <meta content="" name="description" />
    <meta content="" name="keywords" />

    <!-- Favicons -->
    <link href='{%static "assets/img/logo.png" %}' rel="icon" />
    <link
      href='{%static "assets/img/apple-touch-icon.png"%}'
      rel="apple-touch-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <style>
      .container-bg {
        background-color: #f8f9fa; /* Change to your desired background color */
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .divider:after,
      .divider:before {
        content: "";
        flex: 1;
        height: 1px;
        background: #eee;
      }
      .h-custom {
        height: calc(100% - 73px);
      }
      @media (max-width: 450px) {
        .h-custom {
          height: 100%;
        }
      }
    </style>
  </head>
  <body>
    <section class="vh-100">
      <div class="container-fluid h-custom">
        <div class="row d-flex justify-content-center align-items-center h-100">
          <div class="col-md-9 col-lg-6 col-xl-5">
            <img
              src="{% static 'img/66112.jpg' %}"
              class="img-fluid"
              alt="Sample image"
            />
          </div>
          <div class="col-md-8 col-lg-6 col-xl-4">
            <div class="container p-4 rounded container-bg">
              <form action="/volunteers/signin/" method="post">
                {% csrf_token %}
                <h2 class="mb-4">Sign In</h2>
                <!-- Username input -->
                <div class="mb-3">
                  <i class="fas fa-user fa-lg me-2"></i>
                  <input
                    type="email"
                    class="form-control rounded-pill"
                    id="email"
                    name="email"
                    placeholder="Your Email"
                    required
                  />
                </div>
                <!-- Password input -->
                <div class="mb-3">
                  <i class="fas fa-lock fa-lg me-2"></i>
                  <input
                    type="password"
                    class="form-control rounded-pill"
                    id="pass1"
                    name="pass1"
                    placeholder="Password"
                    required
                  />
                </div>
                <div
                  class="d-flex justify-content-between align-items-center mb-4"
                >
                  <!-- Checkbox -->
                  <div class="form-check mb-0">
                    <input
                      class="form-check-input me-2"
                      type="checkbox"
                      value=""
                      id="form2Example3"
                    />
                    <label class="form-check-label" for="form2Example3">
                      Remember me
                    </label>
                  </div>
                  <a href="#!" class="text-body">Forgot password?</a>
                </div>
                <div class="text-center text-lg-start">
                  <button
                    type="submit"
                    class="btn btn-primary btn-lg rounded-pill px-4"
                  >
                    Sign In
                  </button>
                  <p class="small mt-3">
                    Don't have an account?
                    <a href="#!" class="link-danger">Register</a>
                  </p>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
      <!-- Right -->
      <div class="text-center text-lg-start mt-4 pt-2">
        <a href="#!" class="text-white me-4">
          <i class="fab fa-facebook-f"></i>
        </a>
        <a href="#!" class="text-white me-4">
          <i class="fab fa-twitter"></i>
        </a>
        <a href="#!" class="text-white me-4">
          <i class="fab fa-google"></i>
        </a>
        <a href="#!" class="text-white">
          <i class="fab fa-linkedin-in"></i>
        </a>
      </div>
      <!-- Right -->
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
